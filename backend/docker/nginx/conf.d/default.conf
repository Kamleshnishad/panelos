# ═══════════════════════════════════════════════════════════════
#  PanelOS backend container — nginx vhost
#  Receives HTTP on :8080, routes everything through Laravel's
#  public/index.php via FastCGI to php-fpm on the local Unix socket.
# ═══════════════════════════════════════════════════════════════

server {
    listen 8080 default_server;
    server_name _;

    # Laravel's web root is always public/, never the project root.
    # Putting it lower would expose .env, vendor/, etc.
    root /var/www/html/public;
    index index.php index.html;

    # Hide nginx version from response headers — small but free hardening.
    server_tokens off;

    # Standard upload cap; matches php.ini's upload_max_filesize.
    client_max_body_size 22m;

    # ── Security headers (cheap defence in depth) ─────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ── Gzip — bandwidth + perceived speed ────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Static assets: serve directly, skip PHP ──────────────────
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|webp|ico|woff2?|ttf|eot)$ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # ── Publicly-readable uploads (storage:link symlink) ─────────
    # storage:link creates /var/www/html/public/storage → storage/app/public.
    # We let nginx serve these directly — never touches PHP.
    location ^~ /storage/ {
        try_files $uri =404;
        expires 7d;
        access_log off;
    }

    # ── Everything else → Laravel front controller ───────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP requests via FastCGI to the local fpm socket ─────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60s;
        fastcgi_buffers 8 16k;
        fastcgi_buffer_size 32k;
    }

    # ── Deny dotfiles like .env, .git, .htaccess ─────────────────
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
