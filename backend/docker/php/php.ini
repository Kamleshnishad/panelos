; ═══════════════════════════════════════════════════════════════
;  PanelOS production php.ini overrides
;  Loaded as conf.d/zz-panelos.ini → final overrides win
; ═══════════════════════════════════════════════════════════════

[PHP]
; Never leak stack traces / paths / DB credentials to a 500 response in prod.
; All errors still go to the log (where the dev can read them), just not to
; the browser.
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /proc/self/fd/2          ; → stderr → docker logs
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Reasonable defaults; raise if you see 502s on large invoice PDFs.
memory_limit = 256M
max_execution_time = 60
max_input_time = 60

; Uploads (logos, panel photos, accessory images).
post_max_size = 22M
upload_max_filesize = 20M

default_charset = UTF-8
expose_php = Off                     ; hide PHP version from response headers

[Date]
date.timezone = Asia/Kolkata          ; Indian FY + invoice timestamps

[opcache]
; Production opcache: cache everything aggressively, never re-check timestamps.
; Code never changes at runtime in a built image — checking would just waste CPU.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0       ; do NOT re-stat files on each request
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1
opcache.save_comments = 1             ; Laravel needs annotations (Filament etc.)

[Session]
; Session driver is "cookie" per .env, so PHP-side session storage is mostly
; unused, but keep these sane in case anything falls back to PHP sessions.
session.cookie_secure = 0             ; flip to 1 once you put HTTPS in front
session.cookie_httponly = 1
session.cookie_samesite = "Lax"
