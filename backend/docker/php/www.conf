; ═══════════════════════════════════════════════════════════════
;  PanelOS production php-fpm pool config
;  Listens on a Unix SOCKET (not TCP) — faster than localhost:9000 and
;  unreachable from outside the container.
; ═══════════════════════════════════════════════════════════════

[www]
user = panelos
group = panelos

; Unix domain socket — nginx in the same container talks to FPM through here.
; Faster than TCP, no network stack, no risk of leaking onto the docker net.
;
; CRITICAL: socket group MUST be `nginx` (not `panelos`). FPM workers run as
; `panelos` (defence-in-depth: even if Laravel is compromised, attacker isn't
; root). nginx workers run as `nginx` (Alpine default). For nginx to connect
; to the FPM socket, it needs group permission. Making the socket group `nginx`
; gives nginx read+write while FPM keeps ownership for writes.
listen = /run/php/php-fpm.sock
listen.owner = panelos
listen.group = nginx
listen.mode = 0660

; Dynamic process management — tune later if you see "max_children reached" in
; logs under load. Each worker = ~30 MB RAM, so 20 workers = ~600 MB.
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6

; Recycle workers after N requests to bound any single worker's memory growth
; (Laravel + Composer can leak slowly under load over thousands of requests).
pm.max_requests = 1000
pm.process_idle_timeout = 10s

; Pass environment variables from compose through to PHP (DB creds etc.).
clear_env = no

; Catch worker stdout/stderr and forward it to FPM's main log → docker logs.
catch_workers_output = yes
decorate_workers_output = no

; Slow-query log: any request taking longer than 5s triggers a stack trace.
; Invaluable for finding N+1 queries / blocked DB calls in production.
slowlog = /proc/self/fd/2
request_slowlog_timeout = 5s

php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on
