# ═══════════════════════════════════════════════════════════════
#  PanelOS frontend container — nginx vhost
#  Two jobs:
#   1. Serve the Vue SPA from /usr/share/nginx/html (with SPA fallback)
#   2. Reverse-proxy /api/* and /storage/* to the backend container
#  All requests hit the same origin (http://host:3030), so the browser
#  never sees a CORS preflight. Cleanest possible setup.
# ═══════════════════════════════════════════════════════════════

# ── Upstream: the backend container, addressed by its compose service name.
upstream panelos_backend {
    server backend:8080;
    keepalive 16;          # reuse TCP connections to backend (cheap latency win)
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version from response headers.
    server_tokens off;

    # API requests can be a few MB (PDFs, report exports).
    client_max_body_size 22m;

    # ── Security headers (cheap defence in depth) ─────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml application/manifest+json;

    # ── /api/* — proxy to backend container ──────────────────────
    # MUST come BEFORE the catch-all `location /` so SPA fallback
    # doesn't swallow API requests.
    location /api/ {
        proxy_pass http://panelos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";   # enables upstream keepalive

        # Bigger buffers — Laravel can send multi-KB headers (CSRF tokens, etc.).
        proxy_buffers 8 16k;
        proxy_buffer_size 32k;

        # Streaming endpoints (PDF, exports) may take a while.
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # ── /storage/* — uploaded assets, proxy to backend ───────────
    # Could be served by frontend nginx if we shared a volume, but proxying
    # is simpler and the backend already serves these directly from disk.
    location /storage/ {
        proxy_pass http://panelos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        expires 7d;
        access_log off;
    }

    # ── Hashed Vue assets: cache forever, hash changes invalidate ─
    # Vite produces names like /assets/index-Bx12yZ9k.js — content-addressable.
    location ~* ^/assets/.*\.(?:css|js|svg|woff2?|png|jpg|jpeg|gif|webp)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Misc static files at root (favicon, etc.) ─────────────────
    location ~* \.(?:ico|svg|png|jpg|jpeg|gif|webp|woff2?|ttf|eot|map)$ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # ── index.html — NEVER cache. If we cache it, users get stale
    # references to old hashed assets after deploy and the app breaks.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # ── SPA fallback: any unmatched route → index.html, Vue Router takes over
    # (e.g. /dashboard, /quotations/42 — no such files on disk).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Deny dotfiles like .git, .env (defence in depth) ──────────
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
